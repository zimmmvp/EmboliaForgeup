<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Planner Battle For Embolia</title>
</head>
<body>
    <header><h1>⚔️ Build Planner - Battle For Embolia 🛡️</h1></header>

    <div class="main-container">
        <main class="personaje-zona">
            <div class="layout-personaje">
                <div class="columna-slots">
                    <div class="slot" data-tipo="armadura" onclick="abrirModalParaSeleccion('armadura')">Armadura</div>
                    <div class="slot" data-tipo="casco" onclick="abrirModalParaSeleccion('casco')">Casco</div>
                </div>
                <div class="imagen-personaje">👤</div>
                <div class="columna-slots">
                    <div class="slot" data-tipo="arma" onclick="abrirModalParaSeleccion('arma')">Arma</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Unificado -->
    <div id="modal-planner" class="modal">
        <div class="modal-contenido" style="width: 600px;">
            <span class="cerrar" onclick="cerrarModal()">&times;</span>
            <h2 id="modal-titulo">Seleccionar Ítem</h2>
            
            <div id="pantalla-seleccion">
                <input type="text" id="busqueda-modal" placeholder="Filtrar..." oninput="filtrarModal(this.value)">
                <div id="lista-modal" class="lista-items-modal"></div>
            </div>
            
            <div id="seccion-edicion" style="display:none;">
                <div class="tooltip-layout">
                    <div class="tooltip-col-izq">
                        <div id="item-preview-img" class="item-img-box">?</div>
                        <div class="info-base-box">
                            <p>Tipo: <span id="text-tipo">Arma</span></p>
                            <p>Rareza: <span id="text-rareza">Normal</span></p>
                            <p>Grado: <span id="text-grado">D</span></p>
                            <p>Poder: <span id="text-poder">0</span></p>
                        </div>
                    </div>
                    <div class="tooltip-col-der" id="lista-mods-agregados"></div>
                </div>
                <div style="margin-top:15px;">
                    <select id="select-rareza" onchange="actualizarInfo()">
                        <option value="normal">Normal</option><option value="magico">Mágico</option>
                        <option value="raro">Raro</option><option value="epico">Épico</option>
                        <option value="legendario">Legendario</option>
                    </select>
                    <input type="number" id="input-poder" placeholder="Poder" oninput="actualizarInfo()">
                    <select id="select-grado" onchange="actualizarInfo()">
                        <option value="D">Grado D</option><option value="C">Grado C</option>
                        <option value="B">Grado B</option>
                    </select>
                    <hr>
                    <select id="select-mods">
                        <option value="Ataque">Ataque</option><option value="Critico">Critico</option>
                        <option value="Ganancia de Vida">Ganancia de Vida</option>
                    </select>
                    <input type="number" id="input-valor-mod" placeholder="Valor">
                    <button onclick="agregarModSeleccionado()">Agregar</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
