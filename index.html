<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Planner Battle For Embolia</title>
</head>
<body>
    <header><h1>⚔️ Build Planner - Battle For Embolia 🛡️</h1></header>
    <div class="main-layout">
        <aside class="col-habilidades"><h2>Habilidades</h2><div id="lista-habilidades"></div></aside>
        <main class="col-equipamiento">
            <h2>Equipamiento</h2>
            <div class="personaje-grid">
                <div class="col-slots">
                    <div class="slot" data-slot="casco" onclick="abrirModalParaSeleccion('casco', 'casco')">Casco</div>
                    <div class="slot" data-slot="armadura" onclick="abrirModalParaSeleccion('armadura', 'armadura')">Armadura</div>
                    <div class="slot" data-slot="guantes" onclick="abrirModalParaSeleccion('guantes', 'guantes')">Guantes</div>
                    <div class="slot" data-slot="arma" onclick="abrirModalParaSeleccion('arma', 'arma')">Arma</div>
                    <div class="slot" data-slot="pico" onclick="abrirModalParaSeleccion('pico', 'pico')">Pico</div>
                </div>
                <div class="centro-personaje"><div class="imagen-personaje">👤</div></div>
                <div class="col-slots">
                    <div class="slot" data-slot="collar" onclick="abrirModalParaSeleccion('collar', 'collar')">Collar</div>
                    <div class="slot" data-slot="anillo" onclick="abrirModalParaSeleccion('anillo', 'anillo')">Anillo</div>
                    <div class="slot" data-slot="botas" onclick="abrirModalParaSeleccion('botas', 'botas')">Botas</div>
                    <div class="slot" data-slot="arma-der" onclick="abrirModalParaSeleccion('arma-der', 'arma-der')">Arma</div>
                    <div class="slot" data-slot="alas" onclick="abrirModalParaSeleccion('alas', 'alas')">Alas</div>
                </div>
            </div>
        </main>
        <aside class="col-estadisticas"><h2>Estadísticas</h2><div id="lista-estadisticas"></div></aside>
    </div>

    <div id="modal-planner" class="modal">
        <div class="modal-contenido" style="width: 750px;">
            <span class="cerrar" onclick="cerrarModal()">&times;</span>
            <h2 id="modal-titulo">Editar Ítem</h2>
            <div id="pantalla-seleccion">
                <div class="filtros-rapidos"><button onclick="filtrarPorTipo('todo')">Todo</button><button onclick="filtrarPorTipo('arma')">Armas</button></div>
                <input type="text" id="busqueda-modal" placeholder="Filtrar..." oninput="filtrarModal(this.value)">
                <div id="lista-modal" class="lista-items-modal"></div>
            </div>
            
            <div id="seccion-edicion" style="display:none;">
                <div class="modal-grid">
                    <div class="col-center">
                        <div id="item-preview-box" class="item-preview-box"><img id="item-preview-img" src="" alt=""><div id="item-nivel-tag" class="item-nivel-tag">+0</div></div>
                        <div class="controles-form">
                            <div class="fila-control"><label>Nivel:</label><select id="select-nivel" onchange="actualizarVisual()"></select></div>
                            <div class="fila-control"><label>Rareza:</label><select id="select-rareza" onchange="actualizarVisual()"></select></div>
                            <div class="fila-control"><label>Grado:</label><select id="select-grado"></select></div>
                            <div class="fila-control"><label>Poder:</label><input type="number" id="input-poder" style="width: 60px;"></div>
                        </div>
                    </div>
                    <div class="col-stats">
                        <div class="bloque-stats"><h3>Stats Base</h3><div id="lista-stats-base"></div><div class="agregar-box"><select id="new-stat-tipo"></select><input type="number" id="new-stat-valor" placeholder="Val"><button onclick="agregarStatBase()">+</button></div></div>
                        <div class="bloque-mods"><h3>Modificadores</h3><div id="lista-mods-agregados"></div><div class="agregar-box"><select id="select-mods"></select><input type="number" id="input-valor-mod" placeholder="Val"><button onclick="agregarModSeleccionado()">+</button></div></div>
                    </div>
                </div>
                <button onclick="guardarYEquipar()" style="width: 100%; margin-top: 20px; padding: 10px;">Guardar y Equipar</button>
            </div>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
