<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Planner Battle For Embolia</title>
</head>
<body>
    <header><h1>⚔️ Build Planner - Battle For Embolia 🛡️</h1></header>

    <div class="main-container">
        <aside class="sidebar">
            <input type="text" id="buscador" placeholder="Buscar ítem...">
            <div id="lista-items"></div>
        </aside>

        <main class="personaje-zona">
            <div class="layout-personaje">
                <div class="columna-slots">
                    <div class="slot" data-tipo="armadura" onclick="abrirModalParaSeleccion('armadura')">Armadura</div>
                    <div class="slot" data-tipo="casco" onclick="abrirModalParaSeleccion('casco')">Casco</div>
                </div>
                <div class="imagen-personaje">👤</div>
                <div class="columna-slots">
                    <div class="slot" data-tipo="arma" onclick="abrirModalParaSeleccion('arma')">Arma</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Único -->
    <div id="modal-planner" class="modal">
        <div class="modal-contenido">
            <span class="cerrar" onclick="cerrarModal()">&times;</span>
            <h2 id="modal-titulo">Seleccionar</h2>
            <input type="text" id="busqueda-modal" placeholder="Filtrar..." oninput="filtrarModal(this.value)">
            <div id="lista-modal" class="lista-items-modal"></div>
            
            <div id="seccion-edicion" style="display:none;">
    <div class="editor-layout">
        <!-- Espacio para la imagen -->
        <div id="item-preview-img" class="item-img-box">?</div>
        
        <div class="editor-controles">
            <label>Rareza:</label>
            <select id="select-rareza">
                <option value="normal">Normal</option>
                <option value="magico">Mágico</option>
                <option value="raro">Raro</option>
                <option value="legendario">Legendario</option>
            </select>

            <label>Nivel (+):</label>
            <input type="number" id="input-nivel" min="0" max="5" value="0">
        </div>
    </div>

    <label>Modificadores:</label>
    <div id="lista-mods-agregados"></div> <!-- Aquí se listarán los stats seleccionados -->
    <input type="text" id="input-stats" placeholder="Ej: +10 Vida (Presiona Enter)">
    
    <button onclick="cerrarModal()">Guardar Cambios</button>
</div>
    <script src="app.js"></script>
</body>
</html>
