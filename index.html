<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Planner Battle For Embolia</title>
</head>
<body>
    <header><h1>⚔️ Build Planner - Battle For Embolia 🛡️</h1></header>
    <div class="main-layout">
        <aside class="col-habilidades"><h2>Habilidades</h2><div id="lista-habilidades"></div></aside>
        <main class="col-equipamiento">
            <h2>Equipamiento</h2>
            <div class="personaje-grid">
                <div class="col-slots">
                    <div class="slot" onclick="abrirModalParaSeleccion('casco')">Casco</div>
                    <div class="slot" onclick="abrirModalParaSeleccion('armadura')">Armadura</div>
                    <div class="slot" onclick="abrirModalParaSeleccion('guantes')">Guantes</div>
                    <div class="slot" onclick="abrirModalParaSeleccion('arma')">Arma</div>
                    <div class="slot" onclick="abrirModalParaSeleccion('pico')">Pico</div>
                </div>
                <div class="centro-personaje"><div class="imagen-personaje">👤</div></div>
                <div class="col-slots">
                    <div class="slot" onclick="abrirModalParaSeleccion('collar')">Collar</div>
                    <div class="slot" onclick="abrirModalParaSeleccion('anillo')">Anillo</div>
                    <div class="slot" onclick="abrirModalParaSeleccion('botas')">Botas</div>
                    <div class="slot" onclick="abrirModalParaSeleccion('arma-der')">Arma</div>
                    <div class="slot" onclick="abrirModalParaSeleccion('alas')">Alas</div>
                </div>
            </div>
        </main>
        <aside class="col-estadisticas"><h2>Estadísticas</h2><div id="lista-estadisticas"></div></aside>
    </div>

    <div id="modal-planner" class="modal">
        <div class="modal-contenido" style="width: 750px;">
            <span class="cerrar" onclick="cerrarModal()">&times;</span>
            <h2 id="modal-titulo">Editar Ítem</h2>
            <div id="pantalla-seleccion">
                <div class="filtros-rapidos">
                    <button onclick="filtrarPorTipo('todo')">Todo</button>
                    <button onclick="filtrarPorTipo('arma')">Armas</button>
                    <button onclick="filtrarPorTipo('espada')">Espadas</button>
                </div>
                <input type="text" id="busqueda-modal" placeholder="Filtrar por nombre..." oninput="filtrarModal(this.value)">
                <div id="lista-modal" class="lista-items-modal"></div>
            </div>
            <div id="seccion-edicion" style="display:none;">
                <div class="tooltip-layout-final">
                    <div class="col-izq">
                        <div id="item-preview-img" class="item-img-box">?</div>
                        <div class="controles-form">
                            <div class="fila-control"><label>Nivel:</label><select id="select-nivel"></select></div>
                            <div class="fila-control"><label>Rareza:</label><select id="select-rareza"></select></div>
                            <div class="fila-control"><label>Grado:</label><select id="select-grado"></select></div>
                            <div class="fila-control"><label>Poder:</label><input type="number" id="input-poder" style="width: 60px;"></div>
                        </div>
                    </div>
                    <div class="col-der">
                        <div class="bloque-stats">
                            <h3>Stats Base</h3>
                            <div id="lista-stats-base"></div>
                            <div class="agregar-box">
                                <select id="new-stat-tipo"></select>
                                <input type="number" id="new-stat-valor">
                                <button onclick="agregarStatBase()">+</button>
                            </div>
                        </div>
                        <div class="bloque-mods">
                            <h3>Modificadores</h3>
                            <div id="lista-mods-agregados"></div>
                            <div class="agregar-box">
                                <select id="select-mods"></select>
                                <input type="number" id="input-valor-mod" placeholder="Val">
                                <button onclick="agregarModSeleccionado()">+</button>
                            </div>
                        </div>
                    </div>
                </div>
                <button onclick="cerrarModal()" style="width: 100%; margin-top: 20px; padding: 10px;">Guardar y Cerrar</button>
            </div>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
