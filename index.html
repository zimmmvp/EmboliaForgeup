<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Planner Battle For Embolia</title>
</head>
<body>
    <header><h1>⚔️ Build Planner - Battle For Embolia 🛡️</h1></header>
    <div class="main-container">
        <aside class="sidebar">
            <input type="text" id="buscador" placeholder="Buscar ítem...">
            <div id="lista-items"></div>
        </aside>
        <main class="personaje-zona">
            <div class="layout-personaje">
                <div class="columna-slots">
                    <div class="slot" data-tipo="armadura" onclick="abrirModalParaSeleccion('armadura')">Armadura</div>
                    <div class="slot" data-tipo="casco" onclick="abrirModalParaSeleccion('casco')">Casco</div>
                </div>
                <div class="imagen-personaje">👤</div>
                <div class="columna-slots">
                    <div class="slot" data-tipo="arma" onclick="abrirModalParaSeleccion('arma')">Arma</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Final -->
    <div id="modal-planner" class="modal">
        <div class="modal-contenido" style="width: 700px;">
            <span class="cerrar" onclick="cerrarModal()">&times;</span>
            <h2 id="modal-titulo">Editar Ítem</h2>
            
            <div id="pantalla-seleccion">
                <input type="text" id="busqueda-modal" placeholder="Filtrar..." oninput="filtrarModal(this.value)">
                <div id="lista-modal" class="lista-items-modal"></div>
            </div>
            
            <div id="seccion-edicion" style="display:none;">
                <div class="tooltip-layout-final">
                    <div class="tooltip-col-izq">
                        <div id="item-preview-img" class="item-img-box">?</div>
                        <div class="controles-form">
                            <label>Rareza:</label>
                            <select id="select-rareza" onchange="actualizarInfo()">
                                <option value="normal" data-color="#ffffff">Normal</option>
                                <option value="magico" data-color="#007bff">Mágico</option>
                                <option value="raro" data-color="#ffff00">Raro</option>
                                <option value="epico" data-color="#ff00ff">Épico</option>
                                <option value="legendario" data-color="#ff8c00">Legendario</option>
                            </select>
                            <label>Grado:</label>
                            <select id="select-grado" onchange="actualizarInfo()">
                                <option value="D">Grado D</option><option value="C">Grado C</option><option value="B">Grado B</option>
                            </select>
                            <label>Poder:</label>
                            <input type="number" id="input-poder" oninput="actualizarInfo()">
                        </div>
                    </div>
                    <div class="tooltip-col-der">
                        <div class="bloque-stats">
                            <h3>Stats Base</h3>
                            <input type="text" id="input-stats-base" placeholder="Ej: Defensa 10">
                        </div>
                        <hr class="linea-divisoria">
                        <div class="bloque-mods">
                            <h3>Modificadores</h3>
                            <div id="lista-mods-agregados"></div>
                            <select id="select-mods">
                                <option value="Critico">Critico</option><option value="Defensa">Defensa</option>
                                <option value="Evasion">Evasion</option>
                            </select>
                            <input type="number" id="input-valor-mod" placeholder="Valor">
                            <button onclick="agregarModSeleccionado()">Agregar</button>
                        </div>
                    </div>
                </div>
                <button onclick="cerrarModal()" style="margin-top:15px; width:100%;">Guardar y Cerrar</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
