<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Planner Battle For Embolia</title>
</head>
<body>
    <header>
        <h1>⚔️ Build Planner - Battle For Embolia 🛡️</h1>
    </header>

    <div class="main-container">
        <!-- Zona 1: Buscador y Lista -->
        <aside class="sidebar">
            <input type="text" id="buscador" placeholder="Buscar ítem...">
            <div id="lista-items"></div>
        </aside>

        <!-- Zona 2: Personaje -->
        <main class="personaje-zona">
    <h2 id="nombre-personaje">Guerrero Zombie</h2>
    
    <div class="layout-personaje">
        <!-- Columna Izquierda (5 slots) -->
        <div class="columna-slots">
            <div class="slot" data-tipo="casco">Casco</div>
            <div class="slot" data-tipo="armadura">Armadura</div>
            <div class="slot" data-tipo="guantes">Guantes</div>
            <div class="slot" data-tipo="botas">Botas</div>
            <div class="slot" data-tipo="alas">Alas</div>
        </div>

        <!-- Personaje en el medio -->
        <div class="imagen-personaje">
            <div class="placeholder-img">👤</div>
        </div>

        <!-- Columna Derecha (5 slots) -->
        <div class="columna-slots">
            <div class="slot" data-tipo="arma">Arma</div>
            <div class="slot" data-tipo="escudo">Escudo</div>
            <div class="slot" data-tipo="anillo">Anillo</div>
            <div class="slot" data-tipo="collar">Collar</div>
            <div class="slot" data-tipo="especial">Especial</div>
        </div>
    </div>
</main>

        <!-- Zona 3: Stats -->
        <section class="stats-panel">
            <h3>Estadísticas Totales</h3>
            <div id="stats-lista">
                <p>Vida: 0</p>
                <p>Ataque: 0</p>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
    <!-- Modal de Edición -->
<div id="modal-edicion" class="modal">
    <div class="modal-contenido">
        <span class="cerrar" onclick="cerrarModal()">&times;</span>
        <h2 id="titulo-item">Editar Ítem</h2>
        
        <label>Rareza:</label>
        <select id="select-rareza">
            <option>Normal</option>
            <option>Mágico</option>
            <option>Raro</option>
            <option>Legendario</option>
        </select>

        <label>Nivel (+):</label>
        <input type="number" id="input-nivel" min="0" max="5" value="0">

        <label>Stats:</label>
        <div id="editor-stats">
            <input type="text" placeholder="Añadir modificador (ej: +10 Vida)">
        </div>

        <button onclick="guardarCambios()">Guardar Cambios</button>
    </div>
</div>
</body>
</html>
