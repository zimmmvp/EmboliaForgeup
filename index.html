<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Planner Battle For Embolia</title>
</head>
<body>
    <header><h1>⚔️ Build Planner - Battle For Embolia 🛡️</h1></header>
    
    <div class="main-layout">
        <aside class="col-habilidades"><h2>Habilidades</h2><div id="lista-habilidades"></div></aside>
        
        <main class="col-equipamiento">
            <h2>Equipamiento</h2>
            <!-- Selector de personajes -->
            <div class="selector-personajes" style="margin-bottom:15px; display:flex; gap:10px;">
                <button onclick="cambiarPersonaje('Guerrero Zombie')">Guerrero Zombie</button>
                <button onclick="cambiarPersonaje('Mago Oscuro')">Mago Oscuro</button>
                <button onclick="cambiarPersonaje('Ninja')">Ninja</button>
            </div>
            <div class="personaje-grid">
                <div class="col-slots">
                    <div class="slot" id="slot-casco" onclick="abrirModalParaSeleccion('casco')">Casco</div>
                    <div class="slot" id="slot-armadura" onclick="abrirModalParaSeleccion('armadura')">Armadura</div>
                    <div class="slot" id="slot-guantes" onclick="abrirModalParaSeleccion('guantes')">Guantes</div>
                    <div class="slot" id="slot-arma" onclick="abrirModalParaSeleccion('arma')">Arma</div>
                    <div class="slot" id="slot-pico" onclick="abrirModalParaSeleccion('pico')">Pico</div>
                </div>
                <div class="centro-personaje">👤</div>
                <div class="col-slots">
                    <div class="slot" id="slot-collar" onclick="abrirModalParaSeleccion('collar')">Collar</div>
                    <div class="slot" id="slot-anillo" onclick="abrirModalParaSeleccion('anillo')">Anillo</div>
                    <div class="slot" id="slot-botas" onclick="abrirModalParaSeleccion('botas')">Botas</div>
                    <div class="slot" id="slot-arma-der" onclick="abrirModalParaSeleccion('arma-der')">Arma</div>
                    <div class="slot" id="slot-alas" onclick="abrirModalParaSeleccion('alas')">Alas</div>
                </div>
            </div>
        </main>
        
        <aside class="col-estadisticas"><h2>Estadísticas</h2><div id="lista-estadisticas"></div></aside>
    </div>

    <!-- Modal (mismo que antes) -->
    <div id="modal-planner" class="modal">
        <!-- ... contenido del modal igual que antes ... -->
    </div>

    <script src="config.js"></script>
    <script src="mapeo_imagenes.js"></script>
    <script src="app.js"></script>
</body>
</html>
